name: Integration tests (chain + etherscan)

on:
  schedule:
    - cron: "0 2,14 * * *" # twice daily: 02:00 and 14:00 UTC
  workflow_dispatch: {}
  # TODO: remove before merge — temporary trigger to validate the workflow
  # runs on real GitHub Actions before merging to main.
  pull_request: {}

jobs:
  integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Start Postgres
        run: docker compose -f tests/docker-compose.yml up -d postgres

      - name: Wait for Postgres
        run: |
          until docker compose -f tests/docker-compose.yml exec -T postgres pg_isready -U sourcify; do
            sleep 1
          done

      # Preinstalled on GitHub-hosted `ubuntu-latest`; only installs in the
      # slim `catthehacker/ubuntu:act-latest` image used by `act` for local
      # CI runs. The presence check skips `apt-get update` on real CI
      # (which would otherwise add ~2 min per run).
      - name: Install PostgreSQL client (if missing)
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y postgresql-client
          fi

      - name: Apply schema
        run: bash tests/migrate.sh

      - name: Start Sourcify server
        run: docker compose -f tests/docker-compose.yml up -d sourcify
        env:
          DRPC_API_KEY: ${{ secrets.DRPC_API_KEY }}
          QUICKNODE_API_KEY: ${{ secrets.QUICKNODE_API_KEY }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}

      - name: Wait for Sourcify server
        run: |
          timeout 30 bash -c 'until curl -fsS "${SOURCIFY_BASE_URL:-http://localhost:5555}/health"; do sleep 2; done'

      - name: Run chain verification tests
        run: npm run test:integration:chain
        env:
          TEST_TIME: "120000"

      - name: Run Etherscan instance tests
        run: npm run test:integration:etherscan

      - name: Dump sourcify logs on failure
        if: failure()
        run: docker compose -f tests/docker-compose.yml logs sourcify

      - name: Tear down
        if: always()
        run: docker compose -f tests/docker-compose.yml down -v
