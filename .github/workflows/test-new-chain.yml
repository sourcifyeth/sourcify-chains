name: Test New Chain

# Runs on PRs whose branch is named `add-chain-<chainId>` (single chain) or
# `add-chain-<id1>-<id2>-<id3>` (multiple chains). The chainIds are parsed
# straight from the branch name — no diff-grep heuristic.
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test-new-chain:
    if: startsWith(github.head_ref, 'add-chain-')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Parse chain IDs from branch name
        id: extract-chains
        run: |
          SUFFIX="${GITHUB_HEAD_REF#add-chain-}"
          if [ -z "$SUFFIX" ]; then
            echo "Branch '$GITHUB_HEAD_REF' has no chainId after 'add-chain-' prefix"
            exit 1
          fi
          # Split on '-' and validate each piece is purely numeric
          NEW_CHAIN_ID=""
          IFS='-' read -ra IDS <<< "$SUFFIX"
          for id in "${IDS[@]}"; do
            if ! [[ "$id" =~ ^[0-9]+$ ]]; then
              echo "Invalid chainId '$id' in branch '$GITHUB_HEAD_REF' — each segment after 'add-chain-' must be a positive integer"
              exit 1
            fi
            NEW_CHAIN_ID="${NEW_CHAIN_ID:+$NEW_CHAIN_ID,}$id"
          done
          echo "NEW_CHAIN_ID=$NEW_CHAIN_ID"
          echo "new_chain_id=$NEW_CHAIN_ID" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Start Postgres
        run: docker compose -f tests/docker-compose.yml up -d postgres

      - name: Wait for Postgres
        run: |
          until docker compose -f tests/docker-compose.yml exec -T postgres pg_isready -U sourcify; do
            sleep 1
          done

      # Preinstalled on GitHub-hosted `ubuntu-latest`; only installs in the
      # slim `catthehacker/ubuntu:act-latest` image used by `act` for local
      # CI runs. The presence check skips `apt-get update` on real CI
      # (which would otherwise add ~2 min per run).
      - name: Install PostgreSQL client (if missing)
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y postgresql-client
          fi

      - name: Apply schema
        run: bash tests/migrate.sh

      - name: Start Sourcify server
        run: docker compose -f tests/docker-compose.yml up -d sourcify
        env:
          DRPC_API_KEY: ${{ secrets.DRPC_API_KEY }}
          QUICKNODE_API_KEY: ${{ secrets.QUICKNODE_API_KEY }}
          QUICKNODE_SUBDOMAIN: ${{ secrets.QUICKNODE_SUBDOMAIN }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}

      - name: Wait for Sourcify server
        run: |
          timeout 30 bash -c 'until curl -fsS "${SOURCIFY_BASE_URL:-http://localhost:5555}/health"; do sleep 2; done'

      - name: Run chain tests for new chain(s)
        run: npm run test:integration:chain
        env:
          NEW_CHAIN_ID: ${{ steps.extract-chains.outputs.new_chain_id }}
          TEST_TIME: "120000"

      # Writes a results table to the job summary and (on PRs) a check run with
      # per-test annotations. Pinned to a commit SHA, not a tag, since tags are
      # mutable. SHA = v6.4.0.
      - name: Publish test report
        if: always()
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386 # v6.4.0
        with:
          report_paths: "junit-*.xml"
          check_name: "New chain test results"
          detailed_summary: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: junit-*.xml
          if-no-files-found: warn

      - name: Dump sourcify logs on failure
        if: failure()
        run: docker compose -f tests/docker-compose.yml logs sourcify

      - name: Tear down
        if: always()
        run: docker compose -f tests/docker-compose.yml down -v
