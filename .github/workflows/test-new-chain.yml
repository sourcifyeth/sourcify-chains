name: Test New Chain

# Runs on PRs that touch chain-overrides.json or additional-chains.json.
# Extracts added/modified chainIds from the diff and runs only those chains.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - chain-overrides.json
      - additional-chains.json

jobs:
  test-new-chain:
    runs-on: ubuntu-latest
    environment: main

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract new chain IDs from PR diff
        id: extract-chains
        run: |
          NEW_CHAIN_ID=$(
            git diff "origin/${{ github.base_ref }}...HEAD" -- chain-overrides.json additional-chains.json \
            | grep '^+' \
            | grep -oE '"[0-9]+"' \
            | tr -d '"' \
            | sort -u \
            | paste -sd ',' -
          )
          echo "NEW_CHAIN_ID=${NEW_CHAIN_ID}"
          echo "new_chain_id=${NEW_CHAIN_ID}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Start Postgres
        run: docker compose -f tests/docker-compose.yml up -d postgres

      - name: Wait for Postgres
        run: |
          until docker compose -f tests/docker-compose.yml exec -T postgres pg_isready -U sourcify; do
            sleep 1
          done

      - name: Apply schema
        run: bash tests/migrate.sh

      - name: Start Sourcify server
        run: docker compose -f tests/docker-compose.yml up -d sourcify
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          ARBISCAN_API_KEY: ${{ secrets.ARBISCAN_API_KEY }}
          POLYGONSCAN_API_KEY: ${{ secrets.POLYGONSCAN_API_KEY }}
          BSCSCAN_API_KEY: ${{ secrets.BSCSCAN_API_KEY }}
          OPTIMISMSCAN_API_KEY: ${{ secrets.OPTIMISMSCAN_API_KEY }}
          BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
          GNOSISSCAN_API_KEY: ${{ secrets.GNOSISSCAN_API_KEY }}
          CELOSCAN_API_KEY: ${{ secrets.CELOSCAN_API_KEY }}
          SNOWSCAN_API_KEY: ${{ secrets.SNOWSCAN_API_KEY }}
          MOONBEAMSCAN_API_KEY: ${{ secrets.MOONBEAMSCAN_API_KEY }}
          MOONRIVERSCAN_API_KEY: ${{ secrets.MOONRIVERSCAN_API_KEY }}
          CRONOSCAN_API_KEY: ${{ secrets.CRONOSCAN_API_KEY }}
          FTMSCAN_API_KEY: ${{ secrets.FTMSCAN_API_KEY }}
          BOBASCAN_API_KEY: ${{ secrets.BOBASCAN_API_KEY }}
          LINEASCAN_API_KEY: ${{ secrets.LINEASCAN_API_KEY }}
          ZETACHAINEXPLORER_API_KEY: ${{ secrets.ZETACHAINEXPLORER_API_KEY }}
          WEMIXSCAN_API_KEY: ${{ secrets.WEMIXSCAN_API_KEY }}
          SCROLLSCAN_API_KEY: ${{ secrets.SCROLLSCAN_API_KEY }}
          MANTLESCAN_API_KEY: ${{ secrets.MANTLESCAN_API_KEY }}
          BLASTSCAN_API_KEY: ${{ secrets.BLASTSCAN_API_KEY }}
          TAIKOSCAN_API_KEY: ${{ secrets.TAIKOSCAN_API_KEY }}
          WORLDCHAINSCAN_API_KEY: ${{ secrets.WORLDCHAINSCAN_API_KEY }}
          INKSCANSCAN_API_KEY: ${{ secrets.INKSCANSCAN_API_KEY }}

      - name: Wait for Sourcify server
        run: |
          until curl -fsS http://localhost:5555/health; do
            sleep 2
          done
        timeout-minutes: 2

      - name: Run chain tests for new chain(s)
        run: npm run test:integration:chain
        env:
          NEW_CHAIN_ID: ${{ steps.extract-chains.outputs.new_chain_id }}
          TEST_TIME: "120000"

      - name: Tear down
        if: always()
        run: docker compose -f tests/docker-compose.yml down -v
