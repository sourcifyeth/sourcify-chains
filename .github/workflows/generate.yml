name: Generate sourcify-chains-default.json

on:
  push:
    branches: [main]
    paths:
      - chain-overrides.json
      - additional-chains.json
      - deprecated-chains.json
      - scripts/**
  schedule:
    - cron: "0 2 * * *" # nightly at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Generate sourcify-chains-default.json
        run: npm run generate
        env:
          QUICKNODE_CONSOLE_API_KEY: ${{ secrets.QUICKNODE_CONSOLE_API_KEY }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sourcify-chains-default.json
          git diff --staged --quiet || (
            git commit -m "chore: regenerate sourcify-chains-default.json [skip ci]" &&
            git push
          )
