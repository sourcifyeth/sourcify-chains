name: Generate sourcify-chains-default.json

on:
  push:
    branches: [main]
    paths:
      - chain-overrides.json
      - additional-chains.json
      - deprecated-chains.json
      - etherscan-api-keys.json
      - scripts/**
  schedule:
    - cron: "0 2 * * *" # nightly at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    environment: main
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Generate sourcify-chains-default.json
        run: npm run generate
        env:
          QUICKNODE_CONSOLE_API_KEY: ${{ secrets.QUICKNODE_CONSOLE_API_KEY }}
          QUICKNODE_API_KEY: ${{ secrets.QUICKNODE_API_KEY }}
          QUICKNODE_SUBDOMAIN: ${{ secrets.QUICKNODE_SUBDOMAIN }}
          DRPC_API_KEY: ${{ secrets.DRPC_API_KEY }}

      - name: Open PR if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sourcify-chains-default.json tx-cache.json
          if git diff --staged --quiet; then
            echo "No changes to sourcify-chains-default.json or tx-cache.json"
            exit 0
          fi
          BRANCH="chore/regenerate-chains"
          git checkout -b "$BRANCH"
          git commit -m "chore: regenerate sourcify-chains-default.json"
          git push origin "$BRANCH" --force
          # Open a PR if one isn't already open for this branch
          gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number' | grep -q . \
            || gh pr create \
                --title "chore: regenerate sourcify-chains-default.json" \
                --body "Automated regeneration by CI. Review chain additions/removals before merging." \
                --base main \
                --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
